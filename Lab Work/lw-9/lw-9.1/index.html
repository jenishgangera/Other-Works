<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart Header</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <!-- Top Bar -->
    <div class="top-bar">
        <p>Super Value Deals - Save more with coupons</p>

        <select>
            <option>English</option>
            <option>Gujarati</option>
            <option>Hindi</option>
        </select>
    </div>

    <!-- Main Header -->
    <div class="main-header">

        <!-- Logo -->
        <div class="logo">
            <i class="fa-solid fa-cart-shopping"></i>
            <h2>FreshCart</h2>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" placeholder="Search for products">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <!-- Location -->
        <button class="location">
            <i class="fa-solid fa-location-dot"></i>
            Location
        </button>

        <!-- Icons -->
        <div class="icons">

            <div class="icon">
                <i class="fa-solid fa-heart"></i>
                <span>4</span>
            </div>

            <div class="icon">
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="icon">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>5</span>
            </div>

        </div>

    </div>

    <!-- Navbar -->
    <nav>

        <button class="department">
            <i class="fa-solid fa-table-cells-large"></i>
            All Departments
        </button>

        <ul>
            <li><a href="#">Home <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Shop <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Stores <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Mega menu <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Pages <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Account <i class="fa-solid fa-angle-down"></i></a></li>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Docs</a></li>
        </ul>

    </nav>

</header>

</body>
</html>
