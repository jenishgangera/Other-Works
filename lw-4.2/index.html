<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>📅 My Daily Schedule</h2>

    <div class="card morning">
        <h3>🌅 Morning</h3>
        <ul>
            <li>Wake up - 6:00 AM</li>
            <li>Exercise</li>
            <li>Breakfast</li>
            <li>Study</li>
        </ul>
    </div>

    <div class="card afternoon">
        <h3>☀ Afternoon</h3>
        <ul>
            <li>Attend Classes</li>
            <li>Lunch Break</li>
            <li>Project Work</li>
        </ul>
    </div>

    <div class="card evening">
        <h3>🌙 Evening</h3>
        <ul>
            <li>Reading</li>
            <li>Dinner</li>
            <li>Free Time till 10 PM</li>
        </ul>
    </div>

</div>

</body>
</html>
